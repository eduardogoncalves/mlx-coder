name: Build and Release macOS CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v), used for manual runs"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-cli-tag:
    if: github.event_name == 'push'
    name: Build CLI (arm64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift 6.1
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Determine version from tag
        id: vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Make build script executable
        run: chmod +x ./build-and-release.sh

      - name: Build CLI artifacts
        run: ./build-and-release.sh arm64
        env:
          NATIVEAGENT_VERSION: ${{ steps.vars.outputs.version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlx-coder-arm64
          path: |
            releases/mlx-coder-${{ steps.vars.outputs.version }}-arm64.tar.gz
            releases/mlx-coder-${{ steps.vars.outputs.version }}-arm64.pkg
            releases/mlx-coder-${{ steps.vars.outputs.version }}-arm64.sha256
            releases/RELEASE_NOTES_v${{ steps.vars.outputs.version }}.md
          retention-days: 30

  build-cli-manual:
    if: github.event_name == 'workflow_dispatch'
    name: Build CLI (manual)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift 6.1
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Determine manual version
        id: vars
        run: |
          version="${{ inputs.version }}"
          if [[ -z "$version" ]]; then
            version="manual-$(date +%Y%m%d%H%M%S)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Make build script executable
        run: chmod +x ./build-and-release.sh

      - name: Build CLI artifacts
        run: ./build-and-release.sh arm64
        env:
          MLX_CODER_VERSION: ${{ steps.vars.outputs.version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlx-coder-arm64-manual
          path: |
            releases/mlx-coder-${{ steps.vars.outputs.version }}-arm64.tar.gz
            releases/mlx-coder-${{ steps.vars.outputs.version }}-arm64.pkg
            releases/mlx-coder-${{ steps.vars.outputs.version }}-arm64.sha256
            releases/RELEASE_NOTES_v${{ steps.vars.outputs.version }}.md
          retention-days: 30

  create-release:
    if: github.event_name == 'push'
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-cli-tag

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mlx-coder-*
          merge-multiple: true
          path: release-files

      - name: Determine version from tag
        id: vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NativeAgent v${{ steps.vars.outputs.version }}
          generate_release_notes: true
          files: release-files/*
          body: |
            NativeAgent macOS Apple Silicon CLI artifacts.

            Verify checksums before installation:

            shasum -a 256 -c mlx-coder-${{ steps.vars.outputs.version }}-arm64.sha256

            Install:

            sudo installer -pkg mlx-coder-${{ steps.vars.outputs.version }}-arm64.pkg -target /
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
