name: Build and Release macOS CLI

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v), used for manual runs"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-cli-tag:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Build CLI (arm64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is on the main branch
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::error::Release tags must point to a commit on the main branch."
            exit 1
          fi

      - name: Determine version from tag
        id: vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Make build script executable
        run: chmod +x ./build-and-release.sh

      - name: Build CLI artifacts
        run: ./build-and-release.sh arm64
        env:
          MLX_CODER_VERSION: ${{ steps.vars.outputs.version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mlx-coder-arm64
          path: |
            releases/mlx-coder-${{ steps.vars.outputs.version }}-arm64.tar.gz
            releases/mlx-coder-${{ steps.vars.outputs.version }}-arm64.pkg
            releases/mlx-coder-${{ steps.vars.outputs.version }}-arm64.sha256
            releases/RELEASE_NOTES_v${{ steps.vars.outputs.version }}.md
          retention-days: 30

  build-cli-branch:
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')) ||
      github.event_name == 'pull_request'
    name: Build CLI (branch/PR)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Determine branch build version
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref }}
          GIT_SHA: ${{ github.sha }}
        run: |
          branch="$REF_NAME"
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            branch="$HEAD_REF"
          fi

          normalized_branch="$(echo "$branch" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/-+/-/g; s/^-+//; s/-+$//')"
          if [[ -z "$normalized_branch" ]]; then
            normalized_branch="branch"
          fi

          short_sha="${GIT_SHA:0:7}"
          version="branch-${normalized_branch}-${short_sha}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Make build script executable
        run: chmod +x ./build-and-release.sh

      - name: Build CLI artifacts
        run: ./build-and-release.sh arm64
        env:
          MLX_CODER_VERSION: ${{ steps.vars.outputs.version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mlx-coder-arm64-${{ steps.vars.outputs.version }}
          path: |
            releases/mlx-coder-${{ steps.vars.outputs.version }}-arm64.tar.gz
            releases/mlx-coder-${{ steps.vars.outputs.version }}-arm64.pkg
            releases/mlx-coder-${{ steps.vars.outputs.version }}-arm64.sha256
            releases/RELEASE_NOTES_v${{ steps.vars.outputs.version }}.md
          retention-days: 30

  build-cli-manual:
    if: github.event_name == 'workflow_dispatch'
    name: Build CLI (manual)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Determine manual version
        id: vars
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          version="$INPUT_VERSION"
          if [[ -z "$version" ]]; then
            version="manual-$(date +%Y%m%d%H%M%S)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Make build script executable
        run: chmod +x ./build-and-release.sh

      - name: Build CLI artifacts
        run: ./build-and-release.sh arm64
        env:
          MLX_CODER_VERSION: ${{ steps.vars.outputs.version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mlx-coder-arm64-manual
          path: |
            releases/mlx-coder-${{ steps.vars.outputs.version }}-arm64.tar.gz
            releases/mlx-coder-${{ steps.vars.outputs.version }}-arm64.pkg
            releases/mlx-coder-${{ steps.vars.outputs.version }}-arm64.sha256
            releases/RELEASE_NOTES_v${{ steps.vars.outputs.version }}.md
          retention-days: 30

  create-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-cli-tag
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: mlx-coder-*
          merge-multiple: true
          path: release-files

      - name: Determine version from tag
        id: vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: mlx-coder v${{ steps.vars.outputs.version }}
          files: release-files/*
          body: |
            mlx-coder macOS Apple Silicon CLI artifacts.

            Verify checksums before installation:

            shasum -a 256 -c mlx-coder-${{ steps.vars.outputs.version }}-arm64.sha256

            Install:

            sudo installer -pkg mlx-coder-${{ steps.vars.outputs.version }}-arm64.pkg -target /
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
